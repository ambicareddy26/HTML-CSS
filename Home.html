
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annamacharya simple web page</title>
    <style>
        .college{
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            background-color: skyblue;
            padding:30px;
        }
        .college:hover{
            background-color: rgb(241, 133, 56);
        }
        .contents{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background-color: black;
            color: white;
            padding: 5px;
        }

        .contents div{
            font-size: 22px;
            margin-left:50px;
            padding: 8px;
        }
        .contents div:hover{
            background-color: rgb(241, 133, 56);
            border-radius: 5px;
            cursor: pointer;
        }
        .contents div:active{
            opacity: 0.8;
        }
        .contents a{
            text-decoration: none;
            color: white;
        }
        .data{
            height: 600px;
            border: 1px solid black;
            margin: 20px;
            background-color: rgb(190, 188, 188);
        }
        .info{
            margin-top: 30px;
        }
        .info h2{
            font-size: 30px;
            margin-left: 30px;
        }
        .info p{
            margin-left: 30px;
            font-size: 20px;
        }
        .sub{
            text-align: center;
            color: white;
            background-color: black;
            padding: 25px;
            font-size: 25px;
        }
        .box{
            height: 350px;
            width:450px;
            border: 2px solid rgb(117, 114, 114);
            margin-left: 35%;
            border-radius: 5px;
            box-shadow: 5px 5px 10px rgba(90,90,90,90);
        }

        .box:hover{
            height: 400px;
            width:500px;
            border: 2px solid rgb(117, 114, 114);
            background-color: white;
            color: black;
            margin-left: 35%;
            border-radius: 5px;
            box-shadow: 5px 5px 10px rgba(90,90,90,90);
            margin-left: 30%;
            transition: all 1.5s;
        }

        .box:hover input{
            font-size: 18px;
            border:0.5px solid rgb(177, 171, 171);
            padding: 8px;
            border-radius: 5px;
            transition: all 1.5s;
        }

        .box:hover .result{
          padding: 10px 27px;
          margin-top: 40px;
          transition: all 1.5s;
        }

        .details{
            text-align: center;
            margin-top: 25px;
            font-size: 20px;
            line-height: 30px;
        }
        .details input{
            font-size: 18px;
            border: none;
            padding: 8px;
            border-radius: 5px;
        }
        .result{
            padding: 10px;
            color:white;
            background-color: black;
            border: none;
            font-size: 18px;
            margin-top: 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .result:hover{
            opacity: 0.8;
        }
        .result:active{
            opacity: 0.6;
        }
        .footer{
            background-color: black;
            text-align: center;
            padding:30px;
            color:white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="college">Annamacharya University</div>
        <div class="contents">
            <div><a href="Home.html">Home</a></div>
            <div><a href="about.html">About</a></div>
            <div><a href="contact.html">Contact</a></div>
            <div><a href="results.html">Exam Results</a></div>
        </div>
    </div>
    <div class="data">
        <div class="info">
            <h2>Welcome to my website</h2>
            <p>This is a simple website layout using HTML and CSS</p>
        </div>
        <div class="box">
            <div class="sub">Student Login</div>
            <div class="details">
                <label for="rollNo">Registration Number:</label><br>
                <input type="text" placeholder="Enter Registration Number"><br><br>
                <label for="password">Password:</label><br>
                <input type="password" placeholder="Enter Password"><br>
                <button class="result">Login</button>
            </div> 
        </div>
    </div>
    <div class="footer">
        @2026 My Website
    </div>
</body>
</html>
